# Base de datos H2 en memoria (temporal hasta que se conecte PostgreSQL)
spring.datasource.url = jdbc:h2:mem:husrtdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name = org.h2.Driver
spring.datasource.username = sa
spring.datasource.password =
spring.h2.console.enabled = true
spring.h2.console.path = /h2-console

# Crea las tablas automáticamente al iniciar
spring.sql.init.mode = always

spring.application.name = husrt-control
server.port = 8080